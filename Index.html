  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a13d6b22-1de0-4059-8ac8-4b45eb90d00f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7c5854b2-44c5-4777-86da-e728a2e61e15\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a13d6b22-1de0-4059-8ac8-4b45eb90d00f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --blue: #1B8FFF;\n    --blue-dark: #0066CC;\n    --black: #0A0A0A;\n    --white: #FFFFFF;\n    --gray: #888888;\n    --gray-light: #F4F4F2;\n    --gray-mid: #E8E8E4;\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  body {\n    font-family: 'DM Sans', sans-serif;\n    background: var(--black);\n    color: var(--white);\n    overflow-x: hidden;\n  }\n\n  /* LANG TOGGLE */\n  .lang-bar {\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    z-index: 100;\n    display: flex;\n    justify-content: flex-end;\n    padding: 14px 32px;\n    background: rgba(10,10,10,0.85);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n  }\n  .lang-toggle {\n    display: flex;\n    gap: 4px;\n    background: rgba(255,255,255,0.07);\n    border-radius: 100px;\n    padding: 4px;\n  }\n  .lang-btn {\n    padding: 5px 16px;\n    border-radius: 100px;\n    border: none;\n    background: transparent;\n    color: var(--gray);\n    font-family: 'DM Sans', sans-serif;\n    font-size: 12px;\n    font-weight: 500;\n    cursor: pointer;\n    letter-spacing: 0.05em;\n    transition: all 0.2s;\n  }\n  .lang-btn.active {\n    background: var(--blue);\n    color: var(--white);\n  }\n\n  /* HERO */\n  .hero {\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    justify-content: flex-end;\n    padding: 0 40px 80px;\n    position: relative;\n    overflow: hidden;\n  }\n  .hero-bg {\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(160deg, #0A0A0A 0%, #0A1628 40%, #0A0A0A 100%);\n  }\n  .hero-accent {\n    position: absolute;\n    top: -200px; right: -200px;\n    width: 600px; height: 600px;\n    background: radial-gradient(circle, rgba(27,143,255,0.12) 0%, transparent 70%);\n    pointer-events: none;\n  }\n  .hero-line {\n    position: absolute;\n    bottom: 0; left: 40px;\n    width: 1px; height: 200px;\n    background: linear-gradient(to bottom, var(--blue), transparent);\n  }\n  .hero-content { position: relative; z-index: 2; max-width: 700px; }\n  .hero-tag {\n    display: inline-block;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    color: var(--blue);\n    text-transform: uppercase;\n    margin-bottom: 24px;\n    font-weight: 500;\n  }\n  .hero h1 {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(56px, 10vw, 110px);\n    line-height: 0.92;\n    letter-spacing: 0.02em;\n    margin-bottom: 32px;\n  }\n  .hero h1 span { color: var(--blue); }\n  .hero-sub {\n    font-size: 18px;\n    line-height: 1.65;\n    color: rgba(255,255,255,0.65);\n    max-width: 480px;\n    margin-bottom: 48px;\n    font-weight: 300;\n  }\n  .cta-group { display: flex; gap: 16px; flex-wrap: wrap; }\n  .btn-primary {\n    display: inline-block;\n    padding: 16px 36px;\n    background: var(--blue);\n    color: var(--white);\n    text-decoration: none;\n    font-size: 14px;\n    font-weight: 500;\n    letter-spacing: 0.05em;\n    border-radius: 4px;\n    transition: all 0.2s;\n  }\n  .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }\n  .btn-ghost {\n    display: inline-block;\n    padding: 16px 36px;\n    border: 1px solid rgba(255,255,255,0.2);\n    color: rgba(255,255,255,0.7);\n    text-decoration: none;\n    font-size: 14px;\n    font-weight: 500;\n    letter-spacing: 0.05em;\n    border-radius: 4px;\n    transition: all 0.2s;\n  }\n  .btn-ghost:hover { border-color: var(--blue); color: var(--white); }\n\n  /* STATS BAR */\n  .stats {\n    background: rgba(255,255,255,0.03);\n    border-top: 1px solid rgba(255,255,255,0.06);\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n    display: flex;\n    justify-content: center;\n    gap: 0;\n  }\n  .stat {\n    padding: 32px 56px;\n    text-align: center;\n    border-right: 1px solid rgba(255,255,255,0.06);\n  }\n  .stat:last-child { border-right: none; }\n  .stat-num {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 42px;\n    color: var(--blue);\n    letter-spacing: 0.05em;\n    display: block;\n  }\n  .stat-label {\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--gray);\n    margin-top: 4px;\n    display: block;\n  }\n\n  /* SECTIONS */\n  section { padding: 100px 40px; max-width: 900px; margin: 0 auto; }\n\n  .section-tag {\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    color: var(--blue);\n    text-transform: uppercase;\n    font-weight: 500;\n    margin-bottom: 20px;\n    display: block;\n  }\n  h2 {\n    font-family: 'Bebas Neue', sans-serif;\n running on empty and you don't know if it's the food, the posture, or the stress.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pain-item reveal\">\n      <span class=\"pain-icon\">04<\u002Fspan>\n      <p data-en=\"You want to move better and feel stronger. But you need someone to actually show you how.\" data-sr=\"Želiš da se krećeš bolje i osećaš jače. Ali trebaš nekoga da ti zaista pokaže kako.\">You want to move better and feel stronger. but you need someone to actually show you how.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT YOU GET -->\n<section class=\"offerings\">\n  <span class=\"section-tag reveal\" data-en=\"What you get\" data-sr=\"Šta dobijaš\">What you get<\u002Fspan>\n  <h2 class=\"reveal\" data-en=\"This isn't a plan. It's coaching.\" data-sr=\"Ovo nije plan. Ovo je koučing.\">This isn't a plan. It's coaching.<\u002Fh2>\n  <p class=\"section-body reveal\" data-en=\"Everything built around your life. Not a template with your name on it.\" data-sr=\"Sve prilagođeno tvom životu. Ne šablon sa tvojim imenom.\">Everything built around your life. not a template with your name on it.<\u002Fp>\n  <div class=\"offer-list\">\n    <div class=\"offer-item reveal\">\n      <span class=\"offer-num\">01<\u002Fspan>\n      <div class=\"offer-text\">\n        <h3 data-en=\"Full app access\" data-sr=\"Pun pristup aplikaciji\">Full app access<\u002Fh3>\n        <p data-en=\"Training plan, exercise demos, chat, progress tracking. everything you need, in one place. No extra tools, no confusion.\" data-sr=\"Plan treninga, demonstracije vežbi, chat, praćenje napretka. sve što ti treba, na jednom mestu. Bez dodatnih alata, bez zabune.\">Training plan, exercise demos, chat, progress tracking. everything you need, in one place. No extra tools, no confusion.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"offer-item reveal\">\n      <span class=\"offer-num\">02<\u002Fspan>\n      <div class=\"offer-text\">\n        <h3 data-en=\"Direct  WORKS -->\n<section class=\"process\">\n  <span class=\"section-tag reveal\" data-en=\"The process\" data-sr=\"Proces\">The process<\u002Fspan>\n  <h2 class=\"reveal\" data-en=\"How we start.\" data-sr=\"Kako počinjemo.\">How we start.<\u002Fh2>\n  <p class=\"section-body reveal\" data-en=\"Four steps. No fluff.\" data-sr=\"Četiri koraka. Bez nepotrebnog.\">Four steps. No fluff.<\u002Fp>\n  <div class=\"steps\">\n    <div class=\"step reveal\">\n      <div class=\"step-dot\"><\u002Fdiv>\n      <h3 data-en=\"You fill out the questionnaire\" data-sr=\"Popunjavaš upitnik\">You fill out the questionnaire<\u002Fh3>\n      <p data-en=\"So I understand your goals, schedule, limitations, and history. The more honest you are, the better I can help.\" data-sr=\"Da razumem tvoje ciljeve, raspored, ograničenja i istoriju. Što si iskreniji, bolje mogu da pomognem.\">So I understand your goals, schedule, limitations, and history. The more honest you are, the better I can help.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step reveal\">\n      <div class=\"step-dot\"><\u002Fdiv>\n      <h3 data-en=\"We have a free discovery call\" data-sr=\"Imamo besplatan upoznajni poziv\">We have a free discovery call<\u002Fh3>\n      <p data-en=\"Before anything starts, we talk. I want to make sure this is the right fit for both of us.\" data-sr=\"Pre nego što bilo šta počne, popričamo. Važno mi je da proverimo da li je ovo pravi fit za nas oboje.\">Before anything starts, we talk. I want to make sure this is the right fit for both of us.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step reveal\">\n      <div class=\"step-dot\"><\u002Fdiv>\n      <h3 data-en=\"I build your program\" data-sr=\"Pravim tvoj program\">I build your program<\u002Fh3>\n      <p data-en=\"Personalised around your life, not a template with your name on it.\" data-sr=\"Personalizovan oko tvog života, ne šablon sa tvojim imenom.\">Personalised around your life, not a template with your name on it.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step reveal\">\n      <div class=\"step-dot\"><\u002Fdiv>\n      <h3 data-en=\"We start. And I stay with you\" data-sr=\"Počinjemo. I ostajem uz tebe\">We start. and I stay with you<\u002Fh3>\n      <p data-en=\"Regular check-ins, not just numbers on an app. We talk, we adjust, we keep you moving forward. That's the difference between a program and a mentorship.\" data-sr=\"Redovni razgovori, ne samo brojke na aplikaciji. Pričamo, prilagođavamo, idemo napred. To je razlika između programa i mentorstva.\">Regular check-ins, not just numbers on an app. We talk, we adjust, we keep you moving forward. That's the difference between a program and a mentorship.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<div class=\"cta-section\">\n  <span class=\"section-tag reveal\" data-en=\"Ready to start?\" data-sr=\"Spreman da počneš?\">Ready to start?<\u002Fspan>\n  <h2 class=\"reveal\" data-en=\"Let's get to work.\" data-sr=\"Hajde da počnemo.\">Let's get to work.<\u002Fh2>\n  <p class=\"section-body reveal\" data-en=\"Fill out the questionnaire and let's get to work.\" data-sr=\"Popuni upitnik i krećemo.\">Fill out the questionnaire and let's get to work.<\u002Fp>\n  <a href=\"https://docs.google.com/forms/d/1m3H9uvbSViMWt65xfAPJX7wnw8SbmNESVqVjtI8GwAE/edit\" target=\"_blank\" class=\"btn-primary reveal\" data-en=\"Apply for mentorship →\" data-sr=\"Prijavi se za mentorstvo →\">Apply for mentorship →<\u002Fa>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer>\n  <span class=\"footer-brand\">FLEXOLOGY<\u002Fspan>\n  <a href=\"https://instagram.com/flexology.uros\" target=\"_blank\" class=\"footer-link\">@flexology.uros<\u002Fa>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tweak-row\">\n    <span class=\"tweak-label\">Accent color<\u002Fspan>\n    <input type=\"color\" id=\"tweak-accent\" value=\"#1B8FFF\" oninput=\"applyTweaks()\">\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <span class=\"tweak-label\">Hero size<\u002Fspan>\n    <select id=\"tweak-herosize\" onchange=\"applyTweaks()\">\n      <option value=\"0.9\">Compact<\u002Foption>\n      <option value=\"1\" selected=\"\">Normal<\u002Foption>\n      <option value=\"1.1\">Large<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <span class=\"tweak-label\">Body opacity<\u002Fspan>\n    <input type=\"range\" id=\"tweak-bodyop\" min=\"40\" max=\"80\" value=\"65\" oninput=\"applyTweaks()\">\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // LANG\n  function setLang(lang) {\n    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));\n    document.querySelector(`.lang-btn[onclick=\"setLang('${lang}')\"]`).classList.add('active');\n    document.querySelectorAll('[data-en]').forEach(el => {\n      const text = el.getAttribute(`data-${lang}`);\n      if (!text) return;\n      if (el.tagName === 'H1' || el.innerHTML.includes('<span>')) {\n        el.innerHTML = text;\n      } else {\n        el.textContent = text;\n      }\n    });\n  }\n\n  // SCROLL REVEAL\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((entry, i) => {\n      if (entry.isIntersecting) {\n        setTimeout(() => entry.target.classList.add('visible'), 60);\n        observer.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.1 });\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n  // TWEAKS\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  function applyTweaks() {\n    const accent = document.getElementById('tweak-accent').value;\n    const scale = document.getElementById('tweak-herosize').value;\n    const op = document.getElementById('tweak-bodyop').value;\n    document.documentElement.style.setProperty('--blue', accent);\n    document.querySelector('.hero h1').style.fontSize = `clamp(${Math.round(56*scale)}px, ${10*scale}vw, ${Math.round(110*scale)}px)`;\n    document.querySelectorAll('.hero-sub, .section-body, .pain-item p, .offer-text p, .step p').forEach(el => {\n      el.style.color = `rgba(255,255,255,${op/100})`;\n    });\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent, heroScale: scale, bodyOpacity: op } }, '*');\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
